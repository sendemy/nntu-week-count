<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="./vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Счетчик учебной недели</title>
	</head>
	<body>
		<main class="layout">
			<section class="counter" aria-live="polite">
				<p id="counter-label" class="counter__label"></p>
				<h1 id="week-text" class="counter__value">Загрузка...</h1>
				<p id="status" class="counter__status"></p>
			</section>

			<section id="schedule-section" class="schedule" aria-label="Расписание">
				<article id="odd-card" class="schedule__card">
					<img id="odd-image" src="./odd.png" alt="" loading="lazy" />
				</article>
				<article id="even-card" class="schedule__card">
					<img id="even-image" src="./even.png" alt="" loading="lazy" />
				</article>
			</section>
		</main>
		<script type="module" src="./src/main.ts"></script>
	</body>
</html>
